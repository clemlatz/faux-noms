<!DOCTYPE html>
<html lang="fr">
  <head>
    <title>Fonon · Générateur de faux noms</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Qui sait quand vous allez avoir besoin d'un faux nom ? Pas moi. Mais si vous avez besoin d'un faux nom, vous êtes au bon endroit.">
    <link rel="source" href="https://github.com/clemlatz/fonon" />
    <style>
      body {
        background: rgb(252 250 247);
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100vw;
        height: 100vh;
        padding: 0;
        margin: 0;
        font-family: sans-serif;
        font-size: 24px;
      }
    </style>
    <script type="module">
      import noms from './noms.json' with { type: 'json' };

      function getNomAleatoire() {
        const nombreDeNoms = noms.length;
        const indexAleatoire = Math.floor(Math.random() * nombreDeNoms);
        const nomChoisi = noms[indexAleatoire];
        return nomChoisi;
      }

      function afficherNomAleatoire() {
        const { prenom, nom } = getNomAleatoire();
        const fononDiv = document.querySelector('#fonon');
        fononDiv.innerText = `${prenom} ${nom}`;
      }

      window.addEventListener('DOMContentLoaded', () => {
        afficherNomAleatoire();
      });
    </script>
  </head>
  <body>
    <div id="fonon" />
  </body>
</html>
