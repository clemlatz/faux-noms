<!DOCTYPE html>
<html lang="fr">
  <head>
    <title>Fonon · Générateur de faux noms</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
  </head>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const noms = [
        {
          prenom: 'Maude',
          nom: 'Zarella'
        },
        {
          prenom: 'Camille',
          nom: 'Honnête'
        },
      ];

      const nombreDeNoms = noms.length;
      const indexAleatoire = Math.floor(Math.random() * nombreDeNoms);
      const nomChoisi = noms[indexAleatoire];
      const { prenom, nom } = nomChoisi;

      const fauxNomDiv = document.querySelector('#faux-nom');
      fauxNomDiv.innerText = `${prenom} ${nom}`;
    });
  </script>
  <body>
    <div id="fonon" />
  </body>
</html>
