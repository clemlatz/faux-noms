<!DOCTYPE html>
<html lang="fr">
  <head>
    <title>Fonon · Générateur de faux noms rigolos</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Qui sait quand vous allez avoir besoin d'un faux nom ? Pas moi. Mais si vous avez besoin d'un faux nom, vous êtes au bon endroit.">
    <link rel="source" href="https://github.com/clemlatz/fonon" />
    <style>
      body {
        background: #f3e9d1;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100vw;
        height: 100vh;
        padding: 0;
        margin: 0;
        font-family: sans-serif;
        font-size: 24px;
      }

      dialog {
        font-family: monospace;
        font-size: 20px;
      }
    </style>
    <script type="module">
      import noms from './noms.json' with { type: 'json' };

      class Store {
        #items = [];

        get(key) {
          return this.#items[key];
        }

        set(key, value) {
          this.#items[key] = value;
        }

        incrémenter(key) {
          const item = this.#items[key] ?? 0;
          this.#items[key] = item + 1;
        }
      }
      const store = new Store();


      function getNomAleatoire() {
        const nombreDeNoms = noms.length;
        const indexAleatoire = Math.floor(Math.random() * nombreDeNoms);
        const nomChoisi = noms[indexAleatoire];
        return nomChoisi;
      }

      function afficherNomAleatoire() {
        const { prenom, nom } = getNomAleatoire();
        const nomChoisi = `${prenom} ${nom}`;
        renderPage(nomChoisi);
        return nomChoisi;
      }

      function afficherModale() {
        const elementModale = document.querySelector('dialog');
        elementModale.innerHTML = "Fonon a été créé par Clément Latzarus (clemlatz.dev)";
        elementModale.showModal();
        document.addEventListener('keydown', (event) => {
          if (event.key === "x") {
            elementModale.close();
          }
        });
      }
      
      function masquerModale() {
        const elementModale = document.querySelector('dialog');
        elementModale.innerHTML = "";
        elementModale.close();
      }

      function renderPage(content) {
        const elementPrincipal = document.querySelector('main');
        elementPrincipal.innerText = content;
      }

      window.addEventListener('DOMContentLoaded', () => {
        const nomAffiché = afficherNomAleatoire();
        store.set('nomAffiché', nomAffiché); 
        store.incrémenter('nombreDeNomsAffichés');
      });

      document.addEventListener('keydown', (event) => {
        if (event.key === " ") {
          const nomAffiché = afficherNomAleatoire();
          store.set('nomAffiché')
          store.incrémenter('nombreDeNomsAffichés');
        }

        if (event.key === "c") {
          navigator.clipboard.writeText(
            store.get('nomAffiché')
          );
        }

        if (event.key === "?") {
          afficherModale();
        }
      });
    </script>
  </head>
  <body>
    <main></main> 
    <dialog closedby="closerequest"></dialog>
  </body>
</html>
